name: railscout
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so git pull works smoothly

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install boto3 requests

      - run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }} # Fixed: Removed the "=" from this line

      - name: Auto-commit and push log changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update sent_log [skip ci]"
          file_pattern: 'sent_log.json'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
