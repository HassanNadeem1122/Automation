name: railscout

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC = 8am US Eastern / 6pm Pakistan
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — find leads + draft emails, send nothing'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2  # Fixed: Bumped to support Node 24
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0  # Fixed: Bumped to support Node 24
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install boto3 requests

      - name: Pull latest remote changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase

      - name: Run Automation Script
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_ADDRESS: ${{ secrets.SENDER_ADDRESS }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}
          DRY_RUN: ${{ inputs.dry_run }}

      - name: Auto-commit and Push Log Changes
        uses: stefanzweifel/git-auto-commit-action@v5.1.0  # Fixed: Bumped to support Node 24
        with:
          commit_message: "update sent_log + manual leads [skip ci]"
          file_pattern: 'sent_log.json manual_leads.json'
